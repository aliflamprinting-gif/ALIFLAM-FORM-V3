
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALIFLAM FORM V3</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
padding:30px;
margin:0;
}

.card{
max-width:600px;
margin:auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h1{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:15px;
font-size:18px;
box-sizing:border-box;
}

button{
width:100%;
margin-top:15px;
padding:15px;
font-size:18px;
background:#e11d48;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
opacity:.9;
}

</style>

</head>
<body>

<div class="card">

<h1>FORM KONSULTASI ALIFLAM</h1>

<input
type="text"
placeholder="Masukkan Nomor Pesanan">

<button onclick="cekPesanan()">
CEK PESANAN
</button>

<div id="hasil"></div>

</div>

<script>

async function cekPesanan(){

const noPesanan =
document.querySelector("input").value.trim();

if(!noPesanan){
alert("Masukkan nomor pesanan");
return;
}

document.getElementById("hasil").innerHTML =
"⏳ Sedang mencari pesanan...";

try{

const response = await fetch(
"https://script.google.com/macros/s/AKfycbx9BhdfdgFip0HhQyJ0kM1ZMN5ZlB1cUWZs_pYrl9vCcmUkqvtdszKZebNhoD8jhOJq/exec?action=cekPesanan&noPesanan=" + encodeURIComponent(noPesanan)
);

const data = await response.json();

if(!data.success){

if(
data.message ===
"SEMUA_SUDAH_ISI"
){

document.getElementById(
"hasil"
).innerHTML = `

<div style="
padding:15px;
background:#fef2f2;
border-radius:8px;
color:#b91c1c;
">

<b>
✔ PESANAN SUDAH PERNAH MENGISI FORM
</b>

<br><br>

Jika ingin melakukan perubahan,
silahkan hubungi kami melalui WhatsApp.

</div>

`;

}else{

document.getElementById(
"hasil"
).innerHTML = `

<div style="
padding:15px;
background:#fef2f2;
border-radius:8px;
color:#b91c1c;
">

<b>
✖ NOMOR PESANAN TIDAK DITEMUKAN
</b>

<br><br>

Pastikan nomor pesanan yang dimasukkan sudah benar.

<br><br>

Jika pesanan baru saja dibuat,
mohon tunggu sekitar 15–20 menit
agar data masuk ke sistem kami.

</div>

`;

}

return;

}

window.usernameAktif =
data.username;

window.noPesananAktif =
noPesanan;

window.skuAktif =
"";

window.rowAktif =
"";

let html = `
<div style="
margin-top:15px;
padding:15px;
background:#f8fafc;
border-radius:8px;
">

<b>USERNAME :</b><br>
${data.username}
<br><br>
`;

if(
data.items.length === 1
){

window.skuAktif =
data.items[0].sku;

window.rowAktif =
data.items[0].rowIndex;

html += `

<b>SKU :</b><br>

${data.items[0].sku}
(${data.items[0].qty})

<hr style="margin:20px 0;">

<h3>STATUS DESAIN</h3>

<label>
<input
type="radio"
name="statusDesain"
value="BELUM">
 BELUM PUNYA DESAIN
</label>

<br><br>

<label>
<input
type="radio"
name="statusDesain"
value="SUDAH">
 SUDAH PUNYA DESAIN
</label>

<div
id="areaForm"
style="margin-top:20px;">
</div>

`;

}else{

html += `

<b>
PILIH PESANAN YANG AKAN DIISI :
</b>

<br><br>

`;

data.items.forEach(item => {

html += `

<label>

<input
type="radio"
name="pilihSku"
value="${item.rowIndex}"
data-sku="${item.sku}">

${item.sku}
(${item.qty})

</label>

<br><br>

`;

});

html += `

<button
type="button"
onclick="lanjutPilihSku()">

LANJUTKAN

</button>

`;

}

html += `
</div>
`;

document.getElementById(
"hasil"
).innerHTML =
html;

}catch(err){

document.getElementById("hasil").innerHTML =
"❌ Gagal menghubungi server";

}

}

document.addEventListener(
"change",
function(e){

if(
e.target.name ===
"statusDesain"
){

if(
e.target.value ===
"BELUM"
){

tampilkanFormDesain();

}else{

tampilkanFormCekFile();

}

}

if(
e.target.id ===
"jenisCetak"
){

const box =
document.getElementById(
"jenisCetakLainnya"
);

if(box){

box.style.display =
e.target.value ===
"LAINNYA"
? "block"
: "none";

}

}

if(
e.target.id ===
"warnaKonsep"
){

const box =
document.getElementById(
"warnaLainnya"
);

if(box){

box.style.display =
e.target.value ===
"LAINNYA"
? "block"
: "none";

}

}

if(
e.target.id ===
"cfJenisCetak"
){

const box =
document.getElementById(
"cfJenisCetakLainnya"
);

if(box){

box.style.display =
e.target.value === "LAINNYA"
? "block"
: "none";

}

}

if(
e.target.name ===
"modeFile"
){

const area =
document.getElementById(
"areaCanva"
);

if(area){

area.style.display =
e.target.value === "CANVA"
? "block"
: "none";

}

}

});

function lanjutPilihSku(){

const radio =

document.querySelector(
'input[name="pilihSku"]:checked'
);

if(!radio){

alert(
"Pilih pesanan terlebih dahulu"
);

return;

}

window.rowAktif =
radio.value;

window.skuAktif =
radio.dataset.sku;

const areaFormLama =
document.getElementById(
"areaPilihStatus"
);

if(areaFormLama){
areaFormLama.remove();
}

document.getElementById(
"hasil"
).insertAdjacentHTML(
"beforeend",
`
<div id="areaPilihStatus">

<hr style="margin:20px 0;">

<b>
PESANAN YANG DIPILIH :
</b>

<br><br>

${window.skuAktif}

<br><br>

<h3>STATUS DESAIN</h3>

<label>
<input
type="radio"
name="statusDesain"
value="BELUM">
 BELUM PUNYA DESAIN
</label>

<br><br>

<label>
<input
type="radio"
name="statusDesain"
value="SUDAH">
 SUDAH PUNYA DESAIN
</label>

<div
id="areaForm"
style="margin-top:20px;">
</div>

</div>
`
);
}

function tampilkanFormDesain(){

document.getElementById(
"areaForm"
).innerHTML = `

<div style="
margin-top:20px;
padding:15px;
background:#f8fafc;
border-radius:8px;
">

<h3>
FORM BELUM PUNYA DESAIN
</h3>

<label>JENIS CETAK</label>

<select id="jenisCetak">

<option value="">
Pilih Jenis Cetak
</option>

<option>BANNER / SPANDUK</option>
<option>X-BANNER / ROLL BANNER</option>
<option>STAND BANNER KAYU</option>
<option>TAPLAK MEJA SPANDUK</option>
<option>BROSUR / FLYER</option>
<option>KARTU NAMA</option>
<option>STICKER LABEL/METERAN</option>
<option>MENU / POSTER</option>
<option>PIAGAM / SERTIFIKAT</option>

<option value="LAINNYA">
JENIS CETAK LAINNYA
</option>

</select>

<input
id="jenisCetakLainnya"
type="text"
placeholder="Tulis jenis cetak lainnya"
style="display:none;">

<br><br>

<label>UKURAN</label>

<input
id="ukuran"
type="text"
placeholder="Contoh : 100x50 CM">

<br><br>

<label>WARNA / KONSEP</label>

<select
id="warnaKonsep">

<option value="">
Pilih Warna
</option>

<option>MERAH</option>
<option>KUNING</option>
<option>PINK</option>
<option>BIRU</option>
<option>ORANGE</option>

<option>MERAH KUNING</option>
<option>KUNING PINK</option>
<option>HITAM MERAH</option>
<option>BIRU HIJAU</option>

<option value="LAINNYA">
WARNA LAINNYA
</option>

</select>

<input
id="warnaLainnya"
type="text"
placeholder="Tulis warna lainnya"
style="display:none;">

<br><br>

<label>JUDUL / BRAND</label>

<textarea
id="judulBrand"
placeholder="Contoh : WARUNG KOPI ALIFLAM / KEDAI BERKAH ALIFLAM"
style="
width:100%;
height:100px;
padding:12px;
box-sizing:border-box;
"></textarea>

<br><br>

<label>ISI MATERI</label>

<textarea
id="isiMateri"
placeholder="Contoh :

Bakso Pak Budi

Melayani :
- Bakso Urat
- Bakso Jumbo
- Mie Ayam

Jl. Mawar No.123
0815xxxxxxx"
style="
width:100%;
height:180px;
padding:12px;
box-sizing:border-box;
"></textarea>

<br><br>

<label>OPSI GAMBAR</label>

<select
id="opsiGambar"
style="
width:100%;
padding:12px;
">

<option value="">
Pilih Opsi
</option>

<option>
Saya akan kirim ke WhatsApp
</option>

<option>
Serahkan kepada Designer
</option>

<option>
Tidak usah Pakai Gambar
</option>

</select>

<br><br>

<label>CATATAN</label>

<textarea
id="catatan"
placeholder="Contoh :
• Dominan warna merah hitam
• Tambahkan logo yang saya kirim
• Cantumkan sosial media IG, FB atau lainnya"
style="
width:100%;
height:120px;
padding:12px;
box-sizing:border-box;
"></textarea>

<br><br>

<label>NO WHATSAPP</label>

<input
id="noWa"
type="text"
placeholder="08xxxxxxxxxx">

<br><br>

<button
onclick="testKirimForm()">

KIRIM FORM DESAIN

</button>

</div>

`;

}



async function testKirimForm(){

const jenisCetak =
document.getElementById(
"jenisCetak"
).value === "LAINNYA"
?
document.getElementById(
"jenisCetakLainnya"
).value.trim()
:
document.getElementById(
"jenisCetak"
).value.trim();

const ukuran =
document.getElementById(
"ukuran"
).value.trim();

const warnaKonsep =
document.getElementById(
"warnaKonsep"
).value === "LAINNYA"
?
document.getElementById(
"warnaLainnya"
).value.trim()
:
document.getElementById(
"warnaKonsep"
).value.trim();

const isiMateri =
document.getElementById(
"isiMateri"
).value.trim();

const opsiGambar =
document.getElementById(
"opsiGambar"
).value.trim();

const noWa =
document.getElementById(
"noWa"
).value.trim();

if(!jenisCetak){
alert(
"Bagian Jenis Cetak belum diisi, silahkan isi terlebih dahulu."
);
return;
}

if(!ukuran){
alert(
"Bagian Ukuran belum diisi, silahkan isi terlebih dahulu."
);
return;
}

if(!warnaKonsep){
alert(
"Bagian Warna / Konsep belum diisi, silahkan isi terlebih dahulu."
);
return;
}

if(!isiMateri){
alert(
"Bagian Isi Materi belum diisi, silahkan isi terlebih dahulu."
);
return;
}

if(!opsiGambar){
alert(
"Bagian Opsi Gambar belum diisi, silahkan isi terlebih dahulu."
);
return;
}

if(!noWa){
alert(
"Bagian Nomor WhatsApp belum diisi, silahkan isi terlebih dahulu."
);
return;
}

const data = {

action:
"simpanFormDesain",

rowIndex:
window.rowAktif || "",

username:
window.usernameAktif || "",

noPesanan:
window.noPesananAktif || "",

sku:
window.skuAktif || "",

jenisCetak:

document.getElementById(
"jenisCetak"
).value === "LAINNYA"

?

document.getElementById(
"jenisCetakLainnya"
).value

:

document.getElementById(
"jenisCetak"
).value,

ukuran:
document.getElementById(
"ukuran"
).value,

judulBrand:
document.getElementById(
"judulBrand"
).value,

warnaKonsep:

document.getElementById(
"warnaKonsep"
).value === "LAINNYA"

?

document.getElementById(
"warnaLainnya"
).value

:

document.getElementById(
"warnaKonsep"
).value,

isiMateri:
document.getElementById(
"isiMateri"
).value,

opsiGambar:
document.getElementById(
"opsiGambar"
).value,

catatan:
document.getElementById(
"catatan"
).value,

noWa:
document.getElementById(
"noWa"
).value

};

try{

const formData =
new URLSearchParams();

for(const key in data){

formData.append(
key,
data[key]
);

}

const response =
await fetch(

"https://script.google.com/macros/s/AKfycbx9BhdfdgFip0HhQyJ0kM1ZMN5ZlB1cUWZs_pYrl9vCcmUkqvtdszKZebNhoD8jhOJq/exec",

{
method:"POST",
body:formData
}

);

const hasil =
await response.json();

console.log(data);
console.log(hasil);

if(hasil.success){

alert(
"✅ Form berhasil dikirim\n\nID : "
+ hasil.id
);

}else{

alert(
"❌ Gagal menyimpan data"
);

}

}catch(err){

alert(
"❌ Error : "
+ err
);

}

}

function tampilkanFormCekFile(){

document.getElementById(
"areaForm"
).innerHTML = `

<div style="
margin-top:20px;
padding:15px;
background:#f8fafc;
border-radius:8px;
">

<h3>
FORM SUDAH PUNYA DESAIN
</h3>

<label>JENIS CETAK</label>

<select id="cfJenisCetak">

<option value="">
Pilih Jenis Cetak
</option>

<option>BANNER / SPANDUK</option>
<option>X-BANNER / ROLL BANNER</option>

<option>TAPLAK MEJA SPANDUK</option>

<input

async function testKirimFormCekFile(){

const jenisCetak =
document.getElementById(
"cfJenisCetak"
).value === "LAINNYA"
?
document.getElementById(
"cfJenisCetakLainnya"
).value.trim()
:
document.getElementById(
"cfJenisCetak"
).value.trim();

const ukuran =
document.getElementById(
"cfUkuran"
).value.trim();

if(!jenisCetak){
alert(
"Bagian Jenis Cetak belum diisi, silahkan isi terlebih dahulu."
);
return;
}

if(!ukuran){
alert(
"Bagian Ukuran belum diisi, silahkan isi terlebih dahulu."
);
return;
}

const modeFile =
document.querySelector(
'input[name="modeFile"]:checked'
);

if(
modeFile &&
modeFile.value === "CANVA"
){

const linkCanva =
document.getElementById(
"cfLinkCanva"
).value.trim();

if(!linkCanva){

alert(
"Link Canva belum diisi, silahkan isi terlebih dahulu."
);

return;

}

}

if(!modeFile){

alert(
"Silahkan pilih metode pengiriman file terlebih dahulu."
);

return;

}

const data = {

action:
"simpanFormCekFile",

rowIndex:
window.rowAktif || "",

username:
window.usernameAktif || "",

noPesanan:
window.noPesananAktif || "",

sku:
window.skuAktif || "",

jenisCetak:

document.getElementById(
"cfJenisCetak"
).value === "LAINNYA"

?

document.getElementById(
"cfJenisCetakLainnya"
).value

:

document.getElementById(
"cfJenisCetak"
).value,

ukuran:
document.getElementById(
"cfUkuran"
).value,

linkCanva:

modeFile &&
modeFile.value === "CANVA"

?

document.getElementById(
"cfLinkCanva"
).value

:

"",

fileUpload:

modeFile
? modeFile.value
: "",

catatan:
document.getElementById(
"cfCatatan"
).value,

noWa:
document.getElementById(
"cfNoWa"
).value

};

try{

const formData =
new URLSearchParams();

for(const key in data){

formData.append(
key,
data[key]
);

}

const response =
await fetch(

"https://script.google.com/macros/s/AKfycbx9BhdfdgFip0HhQyJ0kM1ZMN5ZlB1cUWZs_pYrl9vCcmUkqvtdszKZebNhoD8jhOJq/exec",

{
method:"POST",
body:formData
}

);

const hasil =
await response.json();

if(hasil.success){

alert(
"✅ Form berhasil dikirim\n\nID : "
+ hasil.id
);

}else{

alert(
"❌ Gagal menyimpan data"
);

}

}catch(err){

alert(
"❌ Error : "
+ err
);

}

}

</script>

</body>
</html>
