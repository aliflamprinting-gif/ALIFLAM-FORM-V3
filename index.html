
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALIFLAM FORM V3</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(
135deg,
#eff6ff 0%,
#f8fafc 50%,
#ffffff 100%
);
padding:8px;
min-height:100vh;
display:flex;
justify-content:center;
align-items:flex-start;
}

.card{
width:min(100%, 900px);
max-width:900px;
background:#ffffff;
padding:35px;
border-radius:24px;
box-shadow:
0 10px 40px rgba(0,0,0,.08);
margin-top:30px;
border:1px solid #e5e7eb;
overflow:hidden;
position:relative;
}

.card::before{
content:"";
position:absolute;
top:0;
left:0;
right:0;
height:6px;

background:
linear-gradient(
90deg,
#ff0055,
#ff8a00,
#ffd500,
#00c853,
#2979ff,
#aa00ff
);
}

.logo-wrap{
text-align:center;
margin-bottom:-15px;
}

.logo-header{
width:280px;
max-width:100%;
height:auto;
object-fit:contain;
filter:
drop-shadow(
0 10px 20px rgba(0,0,0,.15)
);
}

.subtitle{
text-align:center;
font-size:14px;
font-weight:400;
color:#16a34a;
margin-top:-5px;
margin-bottom:25px;
}

h1{
text-align:center;
font-size:42px;
font-weight:800;
color:#111827;
margin-bottom:10px;
}

.card::after{
content:"Form Konsultasi Desain & Cek File";
display:block;
text-align:center;
font-size:15px;
color:#6b7280;
margin-bottom:25px;
}

input,
select,
textarea{
width:100%;
padding:14px 16px;
font-size:16px;
border:2px solid #e5e7eb;
border-radius:12px;
outline:none;
transition:.2s;
background:#fff;
}

input:focus,
select:focus,
textarea:focus{
border-color:#2563eb;
box-shadow:
0 0 0 4px rgba(37,99,235,.15);
}

textarea{
resize:vertical;
width:100%;
display:block;
}

button{
width:100%;
margin-top:15px;
padding:16px;
font-size:17px;
font-weight:700;
border:none;
border-radius:14px;
cursor:pointer;
transition:.25s;
background:linear-gradient(
135deg,
#2563eb,
#1d4ed8
);
color:white;
}

button:hover{
transform:translateY(-2px);
box-shadow:
0 10px 25px rgba(37,99,235,.25);
}

label{
display:block;
font-weight:600;
margin-bottom:8px;
color:#374151;
}

#hasil{
margin-top:20px;
}

#hasil > div{
border-radius:16px !important;
padding:10px !important;
box-shadow:
0 4px 15px rgba(0,0,0,.05);
}

hr{
border:none;
height:1px;
background:#e5e7eb;
margin:20px 0;
}

h3{
color:#111827;
margin-bottom:15px;
}

h4{
color:#111827;
margin-bottom:15px;
}

.status-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:20px;
}

.status-card{
border:2px solid #e5e7eb;
border-radius:18px;
padding:20px;
cursor:pointer;
transition:.25s;
background:#fff;
text-align:center;
}

.status-card:hover{
transform:translateY(-3px);
border-color:#2563eb;
box-shadow:0 10px 25px rgba(37,99,235,.15);
}

.status-icon{
font-size:42px;
margin-bottom:10px;
}

.status-title{
font-size:18px;
font-weight:700;
color:#111827;
margin-bottom:8px;
}

.status-desc{
font-size:14px;
color:#6b7280;
line-height:1.5;
}

.loading-overlay{
position:fixed;
inset:0;
background:rgba(255,255,255,.92);
display:flex;
align-items:center;
justify-content:center;
z-index:99999;
}

.loading-box{
background:#fff;
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 40px rgba(0,0,0,.12);
max-width:350px;
width:90%;
}

.loading-spinner{
width:60px;
height:60px;
border:5px solid #dbeafe;
border-top:5px solid #2563eb;
border-radius:50%;
margin:0 auto 20px;
animation:spin .8s linear infinite;
}

@keyframes spin{
to{
transform:rotate(360deg);
}
}

.popup-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
display:flex;
align-items:center;
justify-content:center;
z-index:999999;
}

.popup-box{
background:#fff;
width:90%;
max-width:420px;
padding:25px;
border-radius:24px;
text-align:center;
box-shadow:0 20px 50px rgba(0,0,0,.20);
animation:popupShow .2s ease;
}

@keyframes popupShow{
from{
opacity:0;
transform:scale(.95);
}
to{
opacity:1;
transform:scale(1);
}
}

.popup-icon{
font-size:60px;
margin-bottom:12px;
}

.popup-title{
font-size:22px;
font-weight:800;
margin-bottom:10px;
color:#111827;
}

.popup-message{
font-size:15px;
line-height:1.6;
color:#6b7280;
margin-bottom:20px;
}

.popup-btn{
width:100%;
padding:14px;
border:none;
border-radius:14px;
font-weight:700;
cursor:pointer;
background:#2563eb;
color:white;
}

.popup-box{
background:#fff;
width:90%;
max-width:420px;
padding:25px;
border-radius:24px;
text-align:center;
box-shadow:0 20px 50px rgba(0,0,0,.20);
animation:popupShow .2s ease;
}

@keyframes popupShow{
from{
opacity:0;
transform:scale(.95);
}
to{
opacity:1;
transform:scale(1);
}
}

.popup-icon{
font-size:60px;
margin-bottom:12px;
}

.popup-title{
font-size:22px;
font-weight:800;
margin-bottom:10px;
color:#111827;
}

.popup-message{
font-size:15px;
line-height:1.6;
color:#6b7280;
margin-bottom:20px;
}

.popup-btn{
width:100%;
padding:14px;
border:none;
border-radius:14px;
font-weight:700;
cursor:pointer;
background:#2563eb;
color:white;
}

@media(max-width:768px){

.status-grid{
grid-template-columns:1fr;
}

}

@media(max-width:768px){

body{
padding:4px;
}

.card{
width:100%;
max-width:none;
padding:18px;
border-radius:18px;
margin-top:0;
}

.card::before{
content:"";
position:absolute;
top:0;
left:0;
right:0;
height:6px;

background:
linear-gradient(
90deg,
#ff0055,
#ff8a00,
#ffd500,
#00c853,
#2979ff,
#aa00ff
);
}

h1{
font-size:30px;
}

button{
font-size:16px;
padding:15px;
}

}

</style>

</head>
<body>

<div class="card">

<div class="logo-wrap">

<img
src="LOGO%20ALIFLAM%20PRINTING%20stroke.png"
class="logo-header">

</div>

<h1>FORM KONSULTASI</h1>

<div class="subtitle">
Solusi cepat PENGUMPULAN isi desain & CEK FILE
</div>

<div style="
margin-top:25px;
background:#f8fafc;
border:1px solid #e5e7eb;
border-radius:18px;
padding:20px;
">

<label
style="
font-size:18px;
font-weight:700;
color:#111827;
margin-bottom:10px;
display:block;
">

MASUKKAN NO PESANAN :

</label>

<div
onclick="lihatCaraSalin()"
style="
display:inline-block;
color:#2563eb;
font-size:14px;
font-weight:700;
text-decoration:underline;
cursor:pointer;
margin-bottom:15px;
">

LIHAT CARA SALIN NO PESANAN

</div>

<input
id="noPesananInput"
type="text"
placeholder="📋 TEKAN lalu TEMPEL di sini">

<button onclick="cekPesanan()">
CEK PESANAN
</button>

</div>

<div id="hasil"></div>

</div>

<script>

function showLoading(
judul,
deskripsi
){

document.body.insertAdjacentHTML(
"beforeend",
`
<div
class="loading-overlay"
id="loadingOverlay">

<div class="loading-box">

<div class="loading-spinner"></div>

<h3 style="
margin-bottom:10px;
color:#111827;
">

${judul}

</h3>

<div style="
color:#6b7280;
line-height:1.6;
">

${deskripsi}

</div>

</div>

</div>
`
);

}

function hideLoading(){

document.getElementById(
"loadingOverlay"
)?.remove();

}

function showPopup(
icon,
title,
message
){

document.body.insertAdjacentHTML(
"beforeend",
`
<div
class="popup-overlay"
id="popupOverlay">

<div class="popup-box">

<div class="popup-icon">
${icon}
</div>

<div class="popup-title">
${title}
</div>

<div class="popup-message">
${message}
</div>

<button
class="popup-btn"
onclick="closePopup()">

OK

</button>

</div>

</div>
`
);

}

function closePopup(){

document.getElementById(
"popupOverlay"
)?.remove();

}

function bukaTutorialCanva(){

document.body.insertAdjacentHTML(
"beforeend",
`
<div
id="tutorialCanvaOverlay"
style="
position:fixed;
inset:0;
background:rgba(0,0,0,.9);
display:flex;
align-items:center;
justify-content:center;
z-index:999999;
padding:10px;
">

<button
onclick="tutupTutorialCanva()"
style="
position:fixed;
top:15px;
right:15px;
width:50px;
height:50px;
border:none;
border-radius:50%;
background:#ef4444;
color:white;
font-size:28px;
font-weight:700;
cursor:pointer;
z-index:9999999;

display:flex;
align-items:center;
justify-content:center;

padding:0;
line-height:1;
">

✕

</button>

<img
src="https://aliflam-form-v3.pages.dev/CARA%20SHARE%20CANVA%20TERBARU%202026.jpg"
style="
max-width:100%;
max-height:95vh;
border-radius:12px;
object-fit:contain;
">

</div>
`
);

}

function tutupTutorialCanva(){

document.getElementById(
"tutorialCanvaOverlay"
)?.remove();

}

function lihatCaraSalin(){

showPopup(
"📋",
"Cara Salin Nomor Pesanan",
`
<div style="
text-align:left;
line-height:1.8;
">

1. Buka aplikasi Shopee<br>
2. Masuk ke Detail Pesanan<br>
3. Salin Nomor Pesanan<br>
4. Kembali ke Form Konsultasi<br>
5. Tekan dan tahan kolom NO PESANAN<br>
6. Pilih TEMPEL

<br><br>

</div>
`
);

}

async function cekPesanan(){

const noPesanan =
document.getElementById(
"noPesananInput"
).value.trim();

if(!noPesanan){
showPopup(
"⚠️",
"Nomor Pesanan Kosong",
"Silakan masukkan nomor pesanan terlebih dahulu."
);
return;
}

showLoading(
"🔎 Mencari Pesanan",
"Mohon tunggu sebentar, sistem sedang memverifikasi data pesanan Anda."
);

try{

const response = await fetch(
"https://script.google.com/macros/s/AKfycbx9BhdfdgFip0HhQyJ0kM1ZMN5ZlB1cUWZs_pYrl9vCcmUkqvtdszKZebNhoD8jhOJq/exec?action=cekPesanan&noPesanan=" + encodeURIComponent(noPesanan)
);

const data = await response.json();

hideLoading();

if(!data.success){

if(
data.message ===
"SEMUA_SUDAH_ISI"
){

showPopup(
"ℹ️",
"Form Sudah Pernah Diisi",
"Pesanan ini sudah pernah mengisi form. Jika ingin melakukan perubahan, silakan hubungi kami melalui WhatsApp."
);

}else{

showPopup(
"❌",
"Nomor Pesanan Tidak Ditemukan",
"Pastikan nomor pesanan yang dimasukkan sudah benar. Jika pesanan baru saja dibuat, mohon tunggu sekitar 15–20 menit agar data masuk ke sistem kami."
);

}

document.getElementById(
"hasil"
).innerHTML = "";

return;

}

window.usernameAktif =
data.username;

window.noPesananAktif =
noPesanan;

window.skuAktif =
"";

window.rowAktif =
"";

let html = `
<div style="
margin-top:15px;
padding:15px;
background:#f8fafc;
border-radius:8px;
">

<div style="
font-weight:700;
color:#1e3a8a;
margin-bottom:6px;
">
USERNAME
</div>

<div style="
background:#dbeafe;
padding:12px;
border-radius:10px;
font-weight:700;
color:#111827;
margin-bottom:15px;
">
${data.username}
</div>
`;

if(
data.items.length === 1
){

window.skuAktif =
data.items[0].sku;

window.rowAktif =
data.items[0].rowIndex;

html += `

<div style="
font-weight:700;
color:#1e3a8a;
margin-bottom:6px;
">
SKU
</div>

<div style="
background:#dbeafe;
padding:12px;
border-radius:10px;
font-weight:700;
color:#111827;
">
${data.items[0].sku}
(${data.items[0].qty})
</div>

<hr style="margin:20px 0;">

<h3 style="
text-align:center;
color:#1d4ed8;
font-size:22px;
">
PILIH LAYANAN :
</h3>

<div class="status-grid">

<div
class="status-card"
onclick="tampilkanFormDesain()">

<div class="status-icon">
🎨
</div>

<div class="status-title">
BELUM PUNYA DESAIN
</div>

<div class="status-desc">
Saya ingin dibantu membuat desain dari awal
</div>

</div>

<div
class="status-card"
onclick="tampilkanFormCekFile()">

<div class="status-icon">
📁
</div>

<div class="status-title">
SUDAH PUNYA DESAIN
</div>

<div class="status-desc">
Saya hanya ingin cek file desain sebelum dicetak
</div>

</div>

</div>

<div
id="areaForm"
style="margin-top:20px;">
</div>

`;

}else{

// Tidak perlu menampilkan informasi jumlah produk.
// Produk akan dipilih melalui popup.

}

html += `
</div>
`;

if(data.items.length > 1){

document.getElementById(
"hasil"
).innerHTML = "";

setTimeout(()=>{

showSkuPopup(
data.items
);

},100);

}else{

document.getElementById(
"hasil"
).innerHTML =
html;

}

}catch(err){

document.getElementById("hasil").innerHTML =
"❌ Gagal menghubungi server";

}

}

document.addEventListener(
"change",
function(e){

if(
e.target.id ===
"jenisCetak"
){

const box =
document.getElementById(
"jenisCetakLainnya"
);

if(box){

box.style.display =
e.target.value ===
"LAINNYA"
? "block"
: "none";

}

const ukuran =
document.getElementById(
"ukuran"
);

if(ukuran){

switch(e.target.value){

case "X-BANNER / ROLL BANNER":
ukuran.value = "60x160 CM";
break;

case "STAND BANNER KAYU":
ukuran.value = "53x90 CM";
break;

case "TAPLAK MEJA SPANDUK":
ukuran.value = "120x120 CM";
break;

case "KARTU NAMA":
ukuran.value = "9 x 5,5 CM";
break;

default:
break;

}

}

const area =
document.getElementById(
"ukuranArea"
);

if(area){

if(e.target.value === "BANNER / SPANDUK"){

area.innerHTML = `

<div style="
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
">

<div>

<label style="
text-align:center;
display:block;
font-weight:700;
color:#1e3a8a;
">
LEBAR KE SAMPING (CM) :
</label>

<input
id="ukuranLebar"
type="number"
placeholder="Contoh : 200"
oninput="updateUkuranBanner()">

</div>

<div>

<label style="
text-align:center;
display:block;
font-weight:700;
color:#1e3a8a;
">
PANJANG KE BAWAH (CM) :
</label>

<input
id="ukuranTinggi"
type="number"
placeholder="Contoh : 100"
oninput="updateUkuranBanner()">

</div>

</div>

<br><br>

<label>
HASIL UKURAN DESAIN
</label>

<input
id="ukuran"
type="text"
readonly
style="
background:#eff6ff;
font-weight:700;
"
placeholder="Otomatis muncul">

`;

}else{

let ukuranDefault = "";

switch(e.target.value){

case "X-BANNER / ROLL BANNER":
ukuranDefault = "60x160 CM";
break;

case "STAND BANNER KAYU":
ukuranDefault = "53x90 CM";
break;

case "TAPLAK MEJA SPANDUK":
ukuranDefault = "120x120 CM";
break;

case "KARTU NAMA":
ukuranDefault = "9 x 5,5 CM";
break;

default:
ukuranDefault = "";
break;

}

area.innerHTML = `

<label>UKURAN</label>

<input
id="ukuran"
type="text"
value="${ukuranDefault}"
placeholder="Contoh : 100x50 CM, A5, 3x3 CM BULAT">

`;

}

}

}

if(
e.target.id ===
"warnaKonsep"
){

const box =
document.getElementById(
"warnaLainnya"
);

if(box){

box.style.display =
e.target.value ===
"LAINNYA"
? "block"
: "none";

}

}

if(
e.target.id ===
"cfJenisCetak"
){

const box =
document.getElementById(
"cfJenisCetakLainnya"
);

if(box){

box.style.display =
e.target.value === "LAINNYA"
? "block"
: "none";

}

const ukuran =
document.getElementById(
"cfUkuran"
);

if(ukuran){

switch(e.target.value){

case "X-BANNER / ROLL BANNER":
ukuran.value = "60x160 CM";
break;

case "STAND BANNER KAYU":
ukuran.value = "53x90 CM";
break;

case "TAPLAK MEJA SPANDUK":
ukuran.value = "120x120 CM";
break;

case "KARTU NAMA":
ukuran.value = "9 x 5,5 CM";
break;

default:
break;

}

}

}

if(
e.target.name ===
"modeFile"
){

const area =
document.getElementById(
"areaCanva"
);

if(area){

if(
e.target.value === "CANVA"
){

area.style.display =
"block";

setTimeout(()=>{

document.getElementById(
"cfLinkCanva"
)?.focus();

},100);

}else{

area.style.display =
"none";

}

}

}

});

function updateUkuranBanner(){

const lebar =
document.getElementById(
"ukuranLebar"
);

const tinggi =
document.getElementById(
"ukuranTinggi"
);

const hasil =
document.getElementById(
"ukuran"
);

if(
!lebar ||
!tinggi ||
!hasil
){
return;
}

if(
lebar.value &&
tinggi.value
){

hasil.value =
lebar.value +
"x" +
tinggi.value +
" CM";

}else{

hasil.value = "";

}

}

function showSkuPopup(items){

window.skuItemsPopup = items;
window.skuDipilihIndex = null;

let html = `
<div
class="popup-overlay"
id="popupSku">

<div
class="popup-box"
style="
max-width:500px;
max-height:85vh;
display:flex;
flex-direction:column;
">

<div class="popup-icon">
📦
</div>

<div class="popup-title">
Pilih Produk
</div>

<div class="popup-message">
Silakan pilih produk yang ingin dikonsultasikan.
</div>

<div style="
max-height:40vh;
overflow-y:auto;
padding-right:4px;
">

`;

items.forEach((item,index)=>{

html += `

<div
id="skuCard${index}"
onclick="pilihSkuSementara(${index})"
style="
border:2px solid #e5e7eb;
border-radius:14px;
padding:14px;
margin-bottom:10px;
cursor:pointer;
transition:.2s;
background:#ffffff;
">

<div style="
font-weight:700;
color:#111827;
margin-bottom:5px;
">
PRODUK KE-${index+1}
</div>

<div
id="skuText${index}"
style="
font-size:15px;
font-weight:700;
color:#2563eb;
">
${item.sku}
</div>

<div style="
font-size:13px;
color:#6b7280;
margin-top:4px;
">
Qty : ${item.qty}
</div>

</div>

`;

});

html += `

</div>

<div style="
margin-top:15px;
padding:12px;
background:#fffbeb;
border:1px solid #fde68a;
border-radius:12px;
font-size:13px;
line-height:1.6;
color:#92400e;
">

💡 Jika bingung pilih yang mana,
boleh konfirmasi dulu ke admin WhatsApp.

</div>

<button
id="btnLanjutSku"
onclick="lanjutkanSkuTerpilih()"
disabled
style="
margin-top:15px;
opacity:.5;
cursor:not-allowed;
">

LANJUTKAN

</button>

</div>

</div>
`;

document.body.insertAdjacentHTML(
"beforeend",
html
);

}

function pilihSkuSementara(index){

window.skuDipilihIndex = index;

document.querySelectorAll(
'[id^="skuCard"]'
).forEach(card=>{

card.style.borderColor = "#e5e7eb";
card.style.background = "#ffffff";

});

const card =
document.getElementById(
"skuCard" + index
);

if(card){

card.style.borderColor = "#2563eb";
card.style.background = "#eff6ff";

}

const btn =
document.getElementById(
"btnLanjutSku"
);

if(btn){

btn.disabled = false;
btn.style.opacity = "1";
btn.style.cursor = "pointer";

}

}
