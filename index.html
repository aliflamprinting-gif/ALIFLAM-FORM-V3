
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALIFLAM FORM V3</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
padding:30px;
margin:0;
}

.card{
max-width:600px;
margin:auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h1{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:15px;
font-size:18px;
box-sizing:border-box;
}

button{
width:100%;
margin-top:15px;
padding:15px;
font-size:18px;
background:#e11d48;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
opacity:.9;
}

</style>

</head>
<body>

<div class="card">

<h1>FORM KONSULTASI ALIFLAM</h1>

<input
type="text"
placeholder="Masukkan Nomor Pesanan">

<button onclick="cekPesanan()">
CEK PESANAN
</button>

<div id="hasil"></div>

</div>

<script>

async function cekPesanan(){

const noPesanan =
document.querySelector("input").value.trim();

if(!noPesanan){
alert("Masukkan nomor pesanan");
return;
}

document.getElementById("hasil").innerHTML =
"⏳ Sedang mencari pesanan...";

try{

const response = await fetch(
"https://script.google.com/macros/s/AKfycbx9BhdfdgFip0HhQyJ0kM1ZMN5ZlB1cUWZs_pYrl9vCcmUkqvtdszKZebNhoD8jhOJq/exec?action=cekPesanan&noPesanan=" + encodeURIComponent(noPesanan)
);

const data = await response.json();

if(!data.success){

document.getElementById("hasil").innerHTML =
"❌ Nomor pesanan tidak ditemukan";

return;

}

window.usernameAktif =
data.username;

window.noPesananAktif =
noPesanan;

window.skuAktif =
data.items[0].sku;

let html = `
<div style="
margin-top:15px;
padding:15px;
background:#f8fafc;
border-radius:8px;
">

<b>USERNAME :</b><br>
${data.username}
<br><br>

<b>RINCIAN PESANAN :</b><br>
`;

data.items.forEach(item => {

html += `
• ${item.sku} (${item.qty})<br>
`;

});

html += `

</div>

<hr style="margin:20px 0;">

<h3>STATUS DESAIN</h3>

<label>
<input
type="radio"
name="statusDesain"
value="BELUM">
 BELUM PUNYA DESAIN
</label>

<br><br>

<label>
<input
type="radio"
name="statusDesain"
value="SUDAH">
 SUDAH PUNYA DESAIN
</label>

<div
id="areaForm"
style="margin-top:20px;">
</div>

`;

document.getElementById("hasil").innerHTML =
html;

}catch(err){

document.getElementById("hasil").innerHTML =
"❌ Gagal menghubungi server";

}

}

document.addEventListener(
"change",
function(e){

if(
e.target.name !==
"statusDesain"
){
return;
}

if(
e.target.value ===
"BELUM"
){

tampilkanFormDesain();

}else{

tampilkanFormCekFile();

}

});

function tampilkanFormDesain(){

document.getElementById(
"areaForm"
).innerHTML = `

<div style="
margin-top:20px;
padding:20px;
background:#111827;
border-radius:20px;
color:white;
">

<h2 style="
text-align:center;
color:#ffb347;
margin-bottom:25px;
">
FORM BELUM PUNYA DESAIN
</h2>

<div style="
background:#0d131d;
padding:15px;
border-radius:15px;
margin-bottom:25px;
">

<div style="margin-bottom:15px;">
<b style="color:#9ca3af;">
👤 USERNAME
</b>
<br>
${window.usernameAktif || "-"}
</div>

<div style="margin-bottom:15px;">
<b style="color:#9ca3af;">
📦 NOMOR PESANAN
</b>
<br>
${window.noPesananAktif || "-"}
</div>

<div>
<b style="color:#9ca3af;">
🏷️ SKU
</b>
<br>
${window.skuAktif || "-"}
</div>

</div>

<h3 style="color:#ffb347;">
DETAIL PESANAN
</h3>

<label>JENIS CETAK</label>

<select
id="jenisCetak"
onchange="toggleJenisCetakLainnya()"
style="
width:100%;
height:50px;
margin-top:8px;
margin-bottom:15px;
">

<option value="">
Pilih Jenis Cetak
</option>

<option>BANNER / SPANDUK</option>
<option>X-BANNER / ROLL BANNER</option>
<option>STAND BANNER KAYU</option>
<option>TAPLAK MEJA SPANDUK</option>
<option>BROSUR / FLYER</option>
<option>KARTU NAMA</option>
<option>STICKER LABEL/METERAN</option>
<option>MENU / POSTER</option>
<option>PIAGAM / SERTIFIKAT</option>

<option value="LAINNYA">
JENIS CETAK LAINNYA
</option>

</select>

<input
type="text"
id="jenisCetakLainnya"
placeholder="Tulis jenis cetak lainnya"
style="
display:none;
width:100%;
padding:12px;
margin-bottom:15px;
box-sizing:border-box;
">

<label>UKURAN</label>

<input
id="ukuran"
type="text"
placeholder="Contoh : 80x120 CM">

<hr style="margin:25px 0;">

<h3 style="color:#ffb347;">
WARNA / TEMA
</h3>

<select
id="warnaKonsep"
onchange="toggleWarnaLainnya()"
style="
width:100%;
height:50px;
margin-bottom:15px;
">

<option value="">
Pilih Warna
</option>

<option>MERAH</option>
<option>KUNING</option>
<option>PINK</option>
<option>BIRU</option>
<option>ORANGE</option>

<option>MERAH KUNING</option>
<option>KUNING PINK</option>
<option>HITAM MERAH</option>
<option>BIRU HIJAU</option>

<option value="LAINNYA">
WARNA LAINNYA
</option>

</select>

<input
type="text"
id="warnaLainnya"
placeholder="Tulis warna lainnya"
style="
display:none;
width:100%;
padding:12px;
margin-bottom:15px;
box-sizing:border-box;
">

<hr style="margin:25px 0;">

<h3 style="color:#ffb347;">
MATERI DESAIN
</h3>

<label>
JUDUL / NAMA USAHA / BRAND
</label>

<textarea
id="judulBrand"
style="
width:100%;
height:100px;
"></textarea>

<br><br>

<label>
ISI TULISAN
</label>

<textarea
id="isiMateri"
style="
width:100%;
height:220px;
"></textarea>

<hr style="margin:25px 0;">

<h3 style="color:#ffb347;">
MODE GAMBAR
</h3>

<select
id="opsiGambar"
style="
width:100%;
height:50px;
">

<option value="">
Pilih Mode
</option>

<option value="WHATSAPP">
Saya Akan Kirim ke WhatsApp
</option>

<option value="DESIGNER">
Serahkan Kepada Designer
</option>

<option value="TANPA_GAMBAR">
Tidak Usah Pakai Gambar
</option>

</select>

<hr style="margin:25px 0;">

<h3 style="color:#ffb347;">
CATATAN
</h3>

<textarea
id="catatan"
style="
width:100%;
height:120px;
"></textarea>

<hr style="margin:25px 0;">

<h3 style="color:#ffb347;">
KONTAK
</h3>

<input
id="noWa"
type="text"
placeholder="08xxxxxxxxxx">

<button
onclick="testKirimForm()"
style="
margin-top:20px;
">

KIRIM FORM DESAIN

</button>

</div>

`;

}

async function testKirimForm(){

const data = {

action:
"simpanFormDesain",

username:
window.usernameAktif || "",

noPesanan:
window.noPesananAktif || "",

sku:
window.skuAktif || "",

jenisCetak:
document.getElementById(
"jenisCetak"
).value,

ukuran:
document.getElementById(
"ukuran"
).value,

judulBrand:
document.getElementById(
"judulBrand"
).value,

warnaKonsep:
document.getElementById(
"warnaKonsep"
).value,

isiMateri:
document.getElementById(
"isiMateri"
).value,

opsiGambar:
document.getElementById(
"opsiGambar"
).value,

catatan:
document.getElementById(
"catatan"
).value,

noWa:
document.getElementById(
"noWa"
).value

};

try{

const formData =
new URLSearchParams();

for(const key in data){

formData.append(
key,
data[key]
);

}

const response =
await fetch(

"https://script.google.com/macros/s/AKfycbx9BhdfdgFip0HhQyJ0kM1ZMN5ZlB1cUWZs_pYrl9vCcmUkqvtdszKZebNhoD8jhOJq/exec",

{
method:"POST",
body:formData
}

);

const hasil =
await response.json();

console.log(data);
console.log(hasil);

if(hasil.success){

alert(
"✅ Form berhasil dikirim\n\nID : "
+ hasil.id
);

}else{

alert(
"❌ Gagal menyimpan data"
);

}

}catch(err){

alert(
"❌ Error : "
+ err
);

}

}

function tampilkanFormCekFile(){

document.getElementById(
"areaForm"
).innerHTML = `

<div style="
padding:15px;
background:#fef3c7;
border-radius:8px;
">

<h3>
FORM SUDAH PUNYA DESAIN
</h3>

<p>
Form cek file akan tampil disini
</p>

</div>

`;

}

function toggleJenisCetakLainnya(){

const val =
document.getElementById(
"jenisCetak"
).value;

document.getElementById(
"jenisCetakLainnya"
).style.display =
val === "LAINNYA"
? "block"
: "none";

}

function toggleWarnaLainnya(){

const val =
document.getElementById(
"warnaKonsep"
).value;

document.getElementById(
"warnaLainnya"
).style.display =
val === "LAINNYA"
? "block"
: "none";

}

</script>

</body>
</html>
