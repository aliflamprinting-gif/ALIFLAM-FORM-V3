async function cekPesanan(){

const noPesanan =
document.querySelector("input").value.trim();

if(!noPesanan){
alert("Masukkan nomor pesanan");
return;
}

document.getElementById("hasil").innerHTML =
"⏳ Sedang mencari pesanan...";

try{

const response = await fetch(
"https://script.google.com/macros/s/AKfycbx9BhdfdgFip0HhQyJ0kM1ZMN5ZlB1cUWZs_pYrl9vCcmUkqvtdszKZebNhoD8jhOJq/exec?action=cekPesanan&noPesanan=" + encodeURIComponent(noPesanan)
);

const data = await response.json();

if(!data.success){

if(
data.message ===
"SEMUA_SUDAH_ISI"
){

document.getElementById(
"hasil"
).innerHTML = `

<div style="
padding:15px;
background:#fef2f2;
border-radius:8px;
color:#b91c1c;
">

<b>
✔ PESANAN SUDAH PERNAH MENGISI FORM
</b>

<br><br>

Jika ingin melakukan perubahan,
silahkan hubungi kami melalui WhatsApp.

</div>

`;

}else{

document.getElementById(
"hasil"
).innerHTML = `

<div style="
padding:15px;
background:#fef2f2;
border-radius:8px;
color:#b91c1c;
">

<b>
✖ NOMOR PESANAN TIDAK DITEMUKAN
</b>

<br><br>

Pastikan nomor pesanan yang dimasukkan sudah benar.

<br><br>

Jika pesanan baru saja dibuat,
mohon tunggu sekitar 15–20 menit
agar data masuk ke sistem kami.

</div>

`;

}

return;

}

window.usernameAktif =
data.username;

window.noPesananAktif =
noPesanan;

window.skuAktif =
"";

window.rowAktif =
"";

let html = `
<div style="
margin-top:15px;

data.items[0].rowIndex;

html += `

🎨

document.getElementById(
"warnaLainnya"

e.target.value ===
"LAINNYA"

}

"cfJenisCetak"
){

const box =
document.getElementById(
"cfJenisCetakLainnya"
);

if(box){

box.style.display =
e.target.value === "LAINNYA"
? "block"
: "none";

}

}

if(
e.target.name ===
"modeFile"
){

const area =
document.getElementById(
"areaCanva"
);

if(area){

e.target.value === "CANVA"

area.style.display =
"block";

setTimeout(()=>{

document.getElementById(
"cfLinkCanva"

},100);

}else{

area.style.display =
"none";

}

}

});

function pilihSkuCard(
rowIndex,

){

window.rowAktif =
rowIndex;

window.skuAktif =
sku;

document
.querySelectorAll(
".sku-card"
)
.forEach(card=>{

card.style.borderColor =
"#e5e7eb";

card.style.background =
"#ffffff";

});

const selected =
document.querySelector(
'[data-row="'+rowIndex+'"]'
);

if(selected){

selected.style.borderColor =
"#2563eb";

selected.style.background =
"#eff6ff";

}

}

async function testKirimForm(){

const data = {

action:
"simpanFormDesain",

rowIndex:
window.rowAktif || "",

username:
window.usernameAktif || "",

noPesanan:
window.noPesananAktif || "",

sku:
window.skuAktif || "",

jenisCetak:

document.getElementById(
"jenisCetak"
).value === "LAINNYA"

?

document.getElementById(
"jenisCetakLainnya"
).value

:

document.getElementById(
"jenisCetak"
).value,

ukuran:
document.getElementById(
"ukuran"
).value,

judulBrand:
document.getElementById(
"judulBrand"
).value,

warnaKonsep:

document.getElementById(
"warnaKonsep"
).value === "LAINNYA"

?

document.getElementById(
"warnaLainnya"
).value

:

document.getElementById(
"warnaKonsep"
).value,

isiMateri:
document.getElementById(
"isiMateri"
).value,

opsiGambar:
document.getElementById(
"opsiGambar"
).value,

catatan:
document.getElementById(
"catatan"
).value,

noWa:
document.getElementById(
"noWa"
).value

};

if(!data.jenisCetak){
alert("Pilih Jenis Cetak");
return;
}

if(!data.ukuran){
alert("Ukuran wajib diisi");
return;
}

if(!data.warnaKonsep){
alert("Pilih Warna / Konsep");
return;
}

if(!data.isiMateri){
alert("Isi Materi wajib diisi");
return;
}

if(!data.opsiGambar){
alert("Pilih Opsi Gambar");
return;
}

if(!data.noWa){
alert("Nomor WhatsApp wajib diisi");
return;
}

const wa =
data.noWa.replace(/\D/g,'');

if(wa.length < 10){
alert("Nomor WhatsApp tidak valid");
return;
}

try{

const formData =
new URLSearchParams();

for(const key in data){

formData.append(
key,
data[key]
);

}

const response =
await fetch(

"https://script.google.com/macros/s/AKfycbx9BhdfdgFip0HhQyJ0kM1ZMN5ZlB1cUWZs_pYrl9vCcmUkqvtdszKZebNhoD8jhOJq/exec",

{
method:"POST",
body:formData
}

);

const hasil =
await response.json();

console.log(data);
console.log(hasil);

if(hasil.success){

alert(
"✅ Form berhasil dikirim\n\nID : "
+ hasil.id +
"\n\nTerima kasih, data Anda sudah kami terima."
);

location.reload();

}else{

alert(
"❌ Gagal menyimpan data.\n\nSilakan coba kembali atau hubungi WhatsApp kami."
);

location.reload();

}

}catch(err){

alert(
"❌ Terjadi kesalahan saat mengirim data.\n\nSilakan coba kembali atau hubungi WhatsApp kami."
);

location.reload();

}

}

height:120px;
padding:12px;
box-sizing:border-box;
"></textarea>

<br><br>

<label>NO WHATSAPP</label>

<input
id="cfNoWa"
type="text"
placeholder="08xxxxxxxxxx">

<br><br>

<button
onclick="testKirimFormCekFile()">

KIRIM FORM CEK FILE

</button>

</div>

`;

}

function pilihModeFile(mode){

document.getElementById(
"modeFileValue"
).value = mode;

const cardCanva =
document.getElementById(
"cardCanva"
);

const cardWhatsapp =
document.getElementById(
"cardWhatsapp"
);

cardCanva.style.borderColor =
"#e5e7eb";

cardWhatsapp.style.borderColor =
"#e5e7eb";

cardCanva.style.background =
"#ffffff";

cardWhatsapp.style.background =
"#ffffff";

if(mode === "CANVA"){

cardCanva.style.borderColor =
"#2563eb";

cardCanva.style.background =
"#eff6ff";

document.getElementById(
"areaCanva"
).style.display =
"block";

setTimeout(()=>{

document.getElementById(
"cfLinkCanva"
)?.focus();

},100);

}else{

cardWhatsapp.style.borderColor =
"#2563eb";

cardWhatsapp.style.background =
"#eff6ff";

document.getElementById(
"areaCanva"
).style.display =
"none";

document.getElementById(
"cfLinkCanva"
).value = "";

}

}

function kembaliPilihLayanan(){

document.querySelectorAll(
".status-grid"
).forEach(el=>{

el.style.display="grid";

});

document.getElementById(
"areaForm"
).innerHTML = "";

}

async function testKirimFormCekFile(){

const modeFile = {

value:

document.getElementById(
"modeFileValue"
).value

};

const data = {

action:
"simpanFormCekFile",

rowIndex:
window.rowAktif || "",

username:
window.usernameAktif || "",

noPesanan:
window.noPesananAktif || "",

sku:
window.skuAktif || "",

jenisCetak:

document.getElementById(
"cfJenisCetak"
).value === "LAINNYA"

?

document.getElementById(
"cfJenisCetakLainnya"
).value

:

document.getElementById(
"cfJenisCetak"
).value,

ukuran:
document.getElementById(
"cfUkuran"
).value,

linkCanva:

modeFile &&
modeFile.value === "CANVA"

?

document.getElementById(
"cfLinkCanva"
).value

:

"",

fileUpload:
modeFile.value || "",

catatan:
document.getElementById(
"cfCatatan"
).value,

noWa:
document.getElementById(
"cfNoWa"
).value

};

if(!data.jenisCetak){
alert("Pilih Jenis Cetak");
return;
}

if(!data.ukuran){
alert("Ukuran wajib diisi");
return;
}

if(!data.fileUpload){
alert("Pilih metode pengiriman file");
return;
}

if(
data.fileUpload === "CANVA"
&&
!data.linkCanva
){
alert("Link Canva wajib diisi");
return;
}

if(!data.noWa){
alert("Nomor WhatsApp wajib diisi");
return;
}

const wa =
data.noWa.replace(/\D/g,'');

if(wa.length < 10){
alert("Nomor WhatsApp tidak valid");
return;
}

try{

const formData =
new URLSearchParams();

for(const key in data){

formData.append(
key,
data[key]
);

}

const response =
await fetch(

"https://script.google.com/macros/s/AKfycbx9BhdfdgFip0HhQyJ0kM1ZMN5ZlB1cUWZs_pYrl9vCcmUkqvtdszKZebNhoD8jhOJq/exec",

{
method:"POST",
body:formData
}

);

const hasil =
await response.json();

if(hasil.success){

alert(
"✅ Form berhasil dikirim\n\nID : "
+ hasil.id +
"\n\nTerima kasih, data Anda sudah kami terima."
);

location.reload();

}else{

alert(
"❌ Gagal menyimpan data.\n\nSilakan coba kembali atau hubungi WhatsApp kami."
);

location.reload();

}

}catch(err){

alert(
"❌ Terjadi kesalahan saat mengirim data.\n\nSilakan coba kembali atau hubungi WhatsApp kami."
);

location.reload();

}

}

</script>

</body>
</html>
