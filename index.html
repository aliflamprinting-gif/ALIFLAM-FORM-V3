
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALIFLAM FORM V3</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
padding:30px;
margin:0;
}

.card{
max-width:600px;
margin:auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h1{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:15px;
font-size:18px;
box-sizing:border-box;
}

button{
width:100%;
margin-top:15px;
padding:15px;
font-size:18px;
background:#e11d48;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
opacity:.9;
}

</style>

</head>
<body>

<div class="card">

<h1>FORM KONSULTASI ALIFLAM</h1>

<input
type="text"
placeholder="Masukkan Nomor Pesanan">

<button onclick="cekPesanan()">
CEK PESANAN
</button>

<div id="hasil"></div>

</div>

<script>

async function cekPesanan(){

const noPesanan =
document.querySelector("input").value.trim();

if(!noPesanan){
alert("Masukkan nomor pesanan");
return;
}

document.getElementById("hasil").innerHTML =
"⏳ Sedang mencari pesanan...";

try{

const response = await fetch(
"https://script.google.com/macros/s/AKfycbx9BhdfdgFip0HhQyJ0kM1ZMN5ZlB1cUWZs_pYrl9vCcmUkqvtdszKZebNhoD8jhOJq/exec?action=cekPesanan&noPesanan=" + encodeURIComponent(noPesanan)
);

const data = await response.json();

if(!data.success){

document.getElementById("hasil").innerHTML =
"❌ Nomor pesanan tidak ditemukan";

return;

}

window.usernameAktif =
data.username;

window.noPesananAktif =
noPesanan;

window.skuAktif =
data.items[0].sku;

let html = `
<div style="
margin-top:15px;
padding:15px;
background:#f8fafc;
border-radius:8px;
">

<b>USERNAME :</b><br>
${data.username}
<br><br>

<b>RINCIAN PESANAN :</b><br>
`;

data.items.forEach(item => {

html += `
• ${item.sku} (${item.qty})<br>
`;

});

html += `

</div>

<hr style="margin:20px 0;">

<h3>STATUS DESAIN</h3>

<label>
<input
type="radio"
name="statusDesain"
value="BELUM">
 BELUM PUNYA DESAIN
</label>

<br><br>

<label>
<input
type="radio"
name="statusDesain"
value="SUDAH">
 SUDAH PUNYA DESAIN
</label>

<div
id="areaForm"
style="margin-top:20px;">
</div>

`;

document.getElementById("hasil").innerHTML =
html;

}catch(err){

document.getElementById("hasil").innerHTML =
"❌ Gagal menghubungi server";

}

}

document.addEventListener(
"change",
function(e){

if(
e.target.name !==
"statusDesain"
){
return;
}

if(
e.target.value ===
"BELUM"
){

tampilkanFormDesain();

}else{

tampilkanFormCekFile();

}

});

function tampilkanFormDesain(){

document.getElementById(
"areaForm"
).innerHTML = `

<div style="
margin-top:20px;
padding:15px;
background:#f8fafc;
border-radius:8px;
">

<h3>
FORM BELUM PUNYA DESAIN
</h3>

<label>
JENIS CETAK
</label>

<select
id="jenisCetak"
style="
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:15px;
">

<option value="">
Pilih Jenis Cetak
</option>

<option>
BANNER / SPANDUK
</option>

<option>
STICKER LABEL
</option>

<option>
KARTU NAMA
</option>

</select>

<label>
UKURAN
</label>

<input
id="ukuran"
type="text"
placeholder="Contoh : 100x50 CM">

<br><br>

<label>
JUDUL / BRAND
</label>

<textarea
id="judulBrand"
style="
width:100%;
height:120px;
padding:12px;
box-sizing:border-box;
"></textarea>

<br><br>

<button
onclick="testKirimForm()">

KIRIM FORM DESAIN

</button>

</div>

`;

}

async function testKirimForm(){

const data = {

action:
"simpanFormDesain",

username:
window.usernameAktif || "",

noPesanan:
window.noPesananAktif || "",

sku:
window.skuAktif || "",

jenisCetak:
document.getElementById(
"jenisCetak"
).value,

ukuran:
document.getElementById(
"ukuran"
).value,

judulBrand:
document.getElementById(
"judulBrand"
).value,

warnaKonsep:"",
isiMateri:"",
opsiGambar:"",
catatan:"",
noWa:""

};

try{

const response =
await fetch(

"https://script.google.com/macros/s/AKfycbx9BhdfdgFip0HhQyJ0kM1ZMN5ZlB1cUWZs_pYrl9vCcmUkqvtdszKZebNhoD8jhOJq/exec",

{
method:"POST",

headers:{
"Content-Type":
"application/json"
},

body:JSON.stringify(data)

}

);

const hasil =
await response.json();

console.log(data);
console.log(hasil);

if(hasil.success){

alert(
"✅ Form berhasil dikirim\n\nID : "
+ hasil.id
);

}else{

alert(
"❌ Gagal menyimpan data"
);

}

}catch(err){

alert(
"❌ Error : "
+ err
);

}

}

function tampilkanFormCekFile(){

document.getElementById(
"areaForm"
).innerHTML = `

<div style="
padding:15px;
background:#fef3c7;
border-radius:8px;
">

<h3>
FORM SUDAH PUNYA DESAIN
</h3>

<p>
Form cek file akan tampil disini
</p>

</div>

`;

}

</script>

</body>
</html>
